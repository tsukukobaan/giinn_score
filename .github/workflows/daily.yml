name: Daily Pipeline

on:
  schedule:
    # 毎日 18:00 JST = 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "対象日 (YYYY-MM-DD, 空=今日)"
        required: false
      dry_run:
        description: "dry-run (AI評価・X投稿スキップ)"
        type: boolean
        default: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Install Playwright
        run: playwright install chromium --with-deps

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          CURRENT_SESSION: ${{ secrets.CURRENT_SESSION || '215' }}
          TARGET_MEETING: "予算委員会"
          REQUIRE_APPROVAL: "false"
        run: |
          ARGS="--session ${CURRENT_SESSION}"
          if [ -n "${{ inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ inputs.date }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -m src.daily_pipeline $ARGS

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results-${{ github.run_id }}
          path: |
            data/results/
            data/images/
            logs/
          if-no-files-found: ignore
